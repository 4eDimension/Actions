name: Codesign Product
description: Submit product to notary

inputs:
  sign:
    required: true
    type: string
  keychain:
    required: true
    type: string
  apple_id:
    required: true
    type: string 
  team_id:
    required: true
    type: string 
  password:
    required: true
    type: string 
  product_path:
    required: true
    type: string
  dmg_path:
    required: true
    type: string
  dmg_exists:
    required: false
    type: boolean
    default: false

outputs:
  product_path: 
    value: ${{ inputs.product_path }}
  dmg_path: 
    value: ${{ inputs.dmg_path }}
  notarization_status:
    value: ${{ steps.notarytool.outputs.notarization_status }}

runs:
  using: "composite"
  steps:

    - name: setup
      id: setup
      run: |
        echo "dmg_path=${{ inputs.dmg_path }}" >> $GITHUB_OUTPUT
        curl "${entitlements_url}" -o entitlements.plist -sL
        echo "entitlements_path=${GITHUB_WORKSPACE}/entitlements.plist" >> $GITHUB_OUTPUT
      shell: bash
      env:
        path: ${{ inputs.product_path }}
        entitlements_url: 'https://raw.githubusercontent.com/miyako/4D/v1/entitlements.plist'

    - name: Normalize ALL WebViewerCEF bundles (helpers exec must not be symlinks)
      shell: bash
      run: |
        set -euo pipefail
        shopt -s nullglob

        echo "🔎 Scan des répertoires *WebViewerCEF.bundle/Contents/Frameworks* dans ${GITHUB_WORKSPACE}"

        py_resolve='import os,sys; base=sys.argv[1]; tgt=sys.argv[2]; print(os.path.abspath(os.path.join(base, tgt)))'

        FOUND=0
        while IFS= read -r -d '' BUNDLE_ROOT; do
          FOUND=1
          echo "📦 Bundle: $BUNDLE_ROOT"

          SRC_CEF="${BUNDLE_ROOT}/Chromium Embedded Framework.framework"
          if [ ! -d "$SRC_CEF" ]; then
            echo "❌ CEF introuvable dans $BUNDLE_ROOT"; exit 1
          fi

          while IFS= read -r -d '' APP; do
            NAME="$(basename "$APP" .app)"
            EXE="$APP/Contents/MacOS/$NAME"

            # 1) L'exécutable principal ne doit pas être un symlink
            if [ -L "$EXE" ]; then
              TGT="$(readlink "$EXE")"
              RESOLVED=$(python3 -c "$py_resolve" "$(dirname "$EXE")" "$TGT")
              if [ ! -f "$RESOLVED" ]; then
                echo "❌ Cible du symlink introuvable: $EXE -> $TGT"; exit 1
              fi
              echo "🪄 Remplace symlink exécutable: $EXE  (-> $TGT)"
              rm -f "$EXE"
              /usr/bin/ditto "$RESOLVED" "$EXE"
              chmod 755 "$EXE"
            fi

            # 2) Chaque helper doit avoir sa copie locale du framework CEF
            DEST_CEF="$APP/Contents/Frameworks/Chromium Embedded Framework.framework"
            if [ -L "$DEST_CEF" ]; then
              echo "🪄 Supprime symlink CEF dans $APP"
              rm -f "$DEST_CEF"
            fi
            if [ ! -d "$DEST_CEF" ]; then
              echo "📚 Copie CEF local dans: $DEST_CEF"
              /usr/bin/ditto "$SRC_CEF" "$DEST_CEF"
            fi

          done < <(find "$BUNDLE_ROOT" -type d -name "4D Helper*.app" -print0)

        done < <(find "${GITHUB_WORKSPACE}" -type d -path "*/WebViewerCEF.bundle/Contents/Frameworks" -print0)

        if [ $FOUND -eq 0 ]; then
          echo "ℹ️ Aucun WebViewerCEF.bundle trouvé (ce n’est pas bloquant)"
        fi

    - name: Preflight — aucun exécutable de helper ne doit être un symlink
      shell: bash
      run: |
        set -euo pipefail
        SYMLINKS_FOUND=0

        while IFS= read -r -d '' SYM; do
          if [ $SYMLINKS_FOUND -eq 0 ]; then
            echo "❌ Symlinks d'exécutables trouvés :"
          fi
          echo " - $SYM"
          SYMLINKS_FOUND=1
        done < <(find "${GITHUB_WORKSPACE}" -type l -path "*/4D Helper*.app/Contents/MacOS/*" -print0)

        if [ $SYMLINKS_FOUND -eq 1 ]; then
          exit 1
        fi

        echo "✅ OK — aucun symlink executable dans les helpers"

    - name: Codesign
      shell: bash
      run: |
        set -euo pipefail

        retry_codesign() {
          local target="$1"
          local timestamp_flag="$2"
          local attempt=1
          local max_attempts=5
          local delay=5
          while [ $attempt -le $max_attempts ]; do
            echo "[$attempt/$max_attempts] codesign de: $target"
            output=$(codesign --verbose --deep --strict --options=runtime $timestamp_flag \
              --force --sign "${sign}" --keychain "${keychain}" \
              --entitlements "${entitlements_path}" "$target" 2>&1)
            status=$?
            echo "$output"
            if [ $status -eq 0 ]; then
              echo "✅ codesign réussi pour $target"
              return 0
            fi
            if echo "$output" | grep -qiE "no identity found|password|resource fork|invalid|not found in keychain|code object is not signed at all"; then
              echo "❌ Erreur fatale détectée, arrêt immédiat."
              return 1
            fi
            echo "⚠️ Tentative $attempt échouée, nouvelle tentative dans ${delay}s..."
            attempt=$(( attempt + 1 ))
            sleep $delay
            delay=$(( delay * 2 ))
          done
          echo "❌ Échec après $max_attempts tentatives pour $target"
          return 1
        }

        # === Étape 1 : signer tous les binaires, frameworks, bundles, plugins, kexts et apps sauf .4dbase/.4darchive ===
        echo "=== Signing all main components ==="
        while IFS= read -r -d '' item; do
          # ⚡ Fix notarisation : signer les binaires internes des bundles avant le bundle lui-même
          if [[ "$item" == *.bundle ]]; then
            for exe in "$item/Contents/MacOS/"*; do
              if [ -f "$exe" ]; then
                echo "🔧 Signing internal executable: $exe"
                retry_codesign "$exe" "--timestamp" || exit 1
              fi
            done
          fi

          # ⚡ Fix sous-apps internes avant de signer une app
          if [[ "$item" == *.app ]]; then
            echo "📦 Application détectée : $item"
            while IFS= read -r -d '' subapp; do
              echo "  ↳ Sous-app détectée : $subapp"
              mainexe="$subapp/Contents/MacOS/$(basename "$subapp" .app)"
              if [ -f "$mainexe" ]; then
                retry_codesign "$mainexe" "--timestamp" || exit 1
              else
                exe=$(find "$subapp" -type f -perm -111 -maxdepth 6 -print -quit || true)
                if [ -n "$exe" ]; then
                  retry_codesign "$exe" "--timestamp" || exit 1
                fi
              fi
              retry_codesign "$subapp" "--timestamp" || exit 1
            done < <(find "$item/Contents/MacOS" -type d -name "*.app" -print0)
          fi

          retry_codesign "$item" "--timestamp" || exit 1
        done < <(
          find "${product_path}" \
            \( -type f -perm -111 -o -name "*.dylib" -o -name "*.so" \
              -o -type d -name "*.framework" -o -type d -name "*.bundle" -o -type d -name "*.plugin" -o -type d -name "*.kext" -o -type d -name "*.app" \) \
            ! -path "*.4dbase/*" ! -path "*.4darchive/*" -print0
        )

        # === Étape 2 : Codesign de l'intérieur des archives (4darchive / 4dbase) ===
        echo "=== Signing contents of .4dbase and .4darchive ==="
        while IFS= read -r -d '' bundle; do
          echo "📂 Signing content inside: $bundle"

          # 1) Exécutables simples et libs (.dylib, .so, exécutables)
          while IFS= read -r -d '' f; do
            echo "🔧 Signing file: $f"
            retry_codesign "$f" "--timestamp" || exit 1
          done < <(find -L "$bundle" -type f \( -perm -111 -o -name "*.dylib" -o -name "*.so" \) -print0)

          # 2) Frameworks
          while IFS= read -r -d '' fw; do
            echo "📘 Framework: $fw"
            fwname="$(basename "$fw" .framework)"
            candidates=("$fw/Versions/A/$fwname" "$fw/Versions/Current/$fwname" "$fw/$fwname")
            found=""
            for c in "${candidates[@]}"; do
              if [ -f "$c" ]; then
                found="$c"
                break
              fi
            done
            if [ -z "$found" ]; then
              # Fallback 1: binaire principal par nom, même sans bit exécutable
              found=$(find -L "$fw" -maxdepth 5 -type f -name "$fwname" -print -quit || true)
            fi
            if [ -z "$found" ]; then
              # Fallback 2: premier exécutable détecté
              found=$(find -L "$fw" -maxdepth 5 -type f -perm -111 -print -quit || true)
            fi
            if [ -n "$found" ]; then
              echo "🔧 Signing framework binary: $found"
              retry_codesign "$found" "--timestamp" || exit 1
            else
              echo "⚠️ Aucun binaire exécutable trouvé dans $fw (on signera quand même le .framework)"
            fi
            while IFS= read -r -d '' dylib; do
              retry_codesign "$dylib" "--timestamp" || exit 1
            done < <(find -L "$fw" -type f -name "*.dylib" -print0)
            retry_codesign "$fw" "--timestamp" || exit 1
          done < <(find -L "$bundle" -type d -name "*.framework" -print0)

          # 3) Applications internes (.app)
          while IFS= read -r -d '' app; do
            echo "📦 Internal .app: $app"
            mainexe="$app/Contents/MacOS/$(basename "$app" .app)"
            if [ -f "$mainexe" ]; then
              retry_codesign "$mainexe" "--timestamp" || exit 1
            else
              exe=$(find -L "$app" -maxdepth 6 -type f -perm -111 -print -quit || true)
              if [ -n "$exe" ]; then
                retry_codesign "$exe" "--timestamp" || exit 1
              fi
            fi
            while IFS= read -r -d '' dylib; do
              retry_codesign "$dylib" "--timestamp" || exit 1
            done < <(find -L "$app" -type f -name "*.dylib" -print0)
            retry_codesign "$app" "--timestamp" || exit 1
          done < <(find -L "$bundle" -type d -name "*.app" -print0)

          # 4) Bundles / plugins / kext
          while IFS= read -r -d '' bp; do
            echo "🔌 Plugin/bundle/kext: $bp"
            exe=$(find -L "$bp" -maxdepth 6 -type f -perm -111 -print -quit || true)
            if [ -n "$exe" ]; then
              retry_codesign "$exe" "--timestamp" || exit 1
            fi
            retry_codesign "$bp" "--timestamp" || exit 1
          done < <(find -L "$bundle" -type d \( -name "*.bundle" -o -name "*.plugin" -o -name "*.kext" \) -print0)

        done < <(
          if [[ -d "${product_path}" && ( "${product_path}" == *.4dbase || "${product_path}" == *.4darchive ) ]]; then
            printf '%s\0' "${product_path}"
          fi
          find -L "${product_path}" -mindepth 1 -type d \( -name "*.4dbase" -o -name "*.4darchive" \) -print0
        )

        # === Étape 2.5 : passe de rattrapage des dylibs (Developer ID + timestamp) ===
        echo "=== Dylib signature sanity pass ==="
        while IFS= read -r -d '' dylib; do
          sig_info=$(codesign -dv --verbose=4 "$dylib" 2>&1 || true)
          has_developer_id=0
          has_timestamp=0

          if echo "$sig_info" | grep -q "Authority=Developer ID Application"; then
            has_developer_id=1
          fi
          if echo "$sig_info" | grep -q "Timestamp="; then
            has_timestamp=1
          fi

          if [[ $has_developer_id -eq 0 || $has_timestamp -eq 0 ]]; then
            echo "⚠️ Re-signature requise: $dylib"
            retry_codesign "$dylib" "--timestamp" || exit 1

            sig_info=$(codesign -dv --verbose=4 "$dylib" 2>&1 || true)
            if ! echo "$sig_info" | grep -q "Authority=Developer ID Application"; then
              echo "❌ Signature invalide (Developer ID absent) après re-signature: $dylib"
              exit 1
            fi
            if ! echo "$sig_info" | grep -q "Timestamp="; then
              echo "❌ Signature invalide (timestamp absent) après re-signature: $dylib"
              exit 1
            fi
          fi
        done < <(find "${product_path}" -type f -name "*.dylib" -print0)

        # === Étape 2.6 : passe de rattrapage des binaires principaux de frameworks ===
        echo "=== Framework main binary signature sanity pass ==="
        while IFS= read -r -d '' fw; do
          fwname="$(basename "$fw" .framework)"
          main_bin=""

          candidates=("$fw/Versions/A/$fwname" "$fw/Versions/Current/$fwname" "$fw/$fwname")
          for c in "${candidates[@]}"; do
            if [ -f "$c" ]; then
              main_bin="$c"
              break
            fi
          done

          if [[ -z "$main_bin" ]]; then
            main_bin=$(find -L "$fw" -maxdepth 5 -type f -name "$fwname" -print -quit || true)
          fi

          if [[ -z "$main_bin" ]]; then
            echo "⚠️ Impossible d'identifier le binaire principal pour $fw"
            continue
          fi

          sig_info=$(codesign -dv --verbose=4 "$main_bin" 2>&1 || true)
          has_developer_id=0
          has_timestamp=0

          if echo "$sig_info" | grep -q "Authority=Developer ID Application"; then
            has_developer_id=1
          fi
          if echo "$sig_info" | grep -q "Timestamp="; then
            has_timestamp=1
          fi

          if [[ $has_developer_id -eq 0 || $has_timestamp -eq 0 ]]; then
            echo "⚠️ Re-signature framework main binary requise: $main_bin"
            retry_codesign "$main_bin" "--timestamp" || exit 1

            sig_info=$(codesign -dv --verbose=4 "$main_bin" 2>&1 || true)
            if ! echo "$sig_info" | grep -q "Authority=Developer ID Application"; then
              echo "❌ Signature framework invalide (Developer ID absent) après re-signature: $main_bin"
              exit 1
            fi
            if ! echo "$sig_info" | grep -q "Timestamp="; then
              echo "❌ Signature framework invalide (timestamp absent) après re-signature: $main_bin"
              exit 1
            fi
          fi
        done < <(find -L "${product_path}" -type d -name "*.framework" -print0)

        # === Étape 3 : signature finale de l’app principale ===
        if [[ "${product_path}" == *.app ]]; then
          echo "📦 Signature finale de l’app principale : ${product_path}"
          retry_codesign "${product_path}" "--timestamp" || exit 1
        else
          echo "ℹ️ ${product_path} n’est pas un .app, pas de signature racine."
        fi

      env:
        sign: ${{ inputs.sign }}
        keychain: ${{ inputs.keychain }}
        product_path: ${{ inputs.product_path }}
        entitlements_path: ${{ steps.setup.outputs.entitlements_path }}

    - name: hdiutil (sparse -> convert)
      id: hdiutil
      if: ${{ inputs.dmg_exists != 'true' && !contains(inputs.product_path, 'update.mac.4darchive') }}
      shell: bash
      env:
        product_path: ${{ inputs.product_path }}
        dmg_path: ${{ steps.setup.outputs.dmg_path }}
        FS: HFS+                 # ou APFS si tu préfères
        FORMAT: UDBZ             # UDBZ (bzip2) ou UDZO (zlib)
        MARGIN_PCT: "50"         # marge % au-dessus de la taille source
        EXTRA_MB: "500"          # marge fixe supplémentaire en MB
        VERIFY: "1"              # 0 pour désactiver verify
      run: |
        set -euo pipefail

        SRC="${product_path}"
        OUT="${dmg_path}"
        VOLNAME="$(basename "${OUT%.dmg}")"
        WORKDIR="$(mktemp -d /tmp/dmgbuild.XXXXXX)"
        MOUNT_DIR="${WORKDIR}/mnt"
        mkdir -p "$MOUNT_DIR"

        # Estimation taille
        SRC_KB=$(du -sk "$SRC" | awk '{print $1}')
        SRC_MB=$(( SRC_KB / 1024 ))
        if [[ $SRC_MB -lt 1 ]]; then SRC_MB=1; fi
        NEEDED_MB=$(( SRC_MB + (SRC_MB * ${MARGIN_PCT} / 100) + ${EXTRA_MB} ))
        if [[ $NEEDED_MB -lt 300 ]]; then NEEDED_MB=300; fi

        # Sparse + montage
        hdiutil create -type SPARSE -fs "${FS}" -volname "${VOLNAME}" -nospotlight \
          -size "${NEEDED_MB}m" -ov "${WORKDIR}/staging.sparseimage"

        hdiutil attach "${WORKDIR}/staging.sparseimage" -nobrowse -noverify -noautoopen -owners on \
          -mountpoint "${MOUNT_DIR}"

        # Copie
        rsync -a --delete "${SRC}" "${MOUNT_DIR}/"

        # Démontage
        sync
        hdiutil detach "${MOUNT_DIR}" || hdiutil detach -force "${MOUNT_DIR}" || true

        # Compact + conversion
        hdiutil compact "${WORKDIR}/staging.sparseimage" || true
        hdiutil convert "${WORKDIR}/staging.sparseimage" -format "${FORMAT}" -o "${OUT}" -ov

        # Verify optionnel
        if [[ "${VERIFY}" == "1" ]]; then
          hdiutil verify "${OUT}"
        fi

        echo "[✓] DMG prêt: ${OUT}"

    - name: Debug notarization env vars
      id: debug-notarization
      if: ${{ !contains(inputs.product_path, 'update.mac.4darchive') }}
      run: |
        echo "Apple ID: ${apple_id}"
        echo "Team ID: ${team_id}"
        echo "Password is set: [${#password} characters]"
      shell: bash
      env:
        apple_id: ${{ inputs.apple_id }}
        team_id: ${{ inputs.team_id }}
        password: ${{ inputs.password }}

    - name: Notarize with Apple NotaryTool and check result (polling)
      id: notarytool
      if: ${{ !contains(inputs.product_path, 'update.mac.4darchive') }}
      shell: bash
      run: |
        set -euo pipefail

        echo "📦 Soumission à Apple NotaryTool..."
        json_output_file="notarytool-submit.json"
        status_file="${GITHUB_WORKSPACE}/notarization_status.txt"

        # soumission (sans --wait)
        xcrun notarytool submit "${dmg_path}" \
          --apple-id "${apple_id}" \
          --team-id "${team_id}" \
          --password "${password}" \
          --output-format json >"$json_output_file"

        echo "📄 JSON submit:"
        cat "$json_output_file" || true

        submission_id=$(jq -r '.id // empty' "$json_output_file")
        if [[ -z "$submission_id" ]]; then
          echo "❌ Impossible de récupérer l’ID de soumission"
          exit 1
        fi
        echo "🆔 Soumission envoyée, ID=$submission_id"

        # Polling (20s) jusqu'à 30min (90 tentatives)
        attempt=0
        max_attempts=90
        sleep_interval=20
        json_error_streak=0
        json_error_limit=5
        status="In Progress"
        last_info_stdout_file=""
        last_info_stderr_file=""
        while [[ "$status" == "In Progress" && $attempt -lt $max_attempts ]]; do
          sleep "$sleep_interval"
          attempt=$((attempt+1))
          echo "⏳ Vérification notarisation (tentative $attempt/$max_attempts)..."

          info_stdout_file="notarytool-info-$attempt.stdout.json"
          info_stderr_file="notarytool-info-$attempt.stderr.log"
          last_info_stdout_file="$info_stdout_file"
          last_info_stderr_file="$info_stderr_file"
          info_exit_code=0

          set +e
          xcrun notarytool info "$submission_id" \
            --apple-id "${apple_id}" \
            --team-id "${team_id}" \
            --password "${password}" \
            --output-format json >"$info_stdout_file" 2>"$info_stderr_file"
          info_exit_code=$?
          set -e

          echo "↳ notarytool info exit code: $info_exit_code"
          echo "📄 JSON info brut (stdout):"
          if [[ -s "$info_stdout_file" ]]; then
            cat "$info_stdout_file"
          else
            echo "<stdout vide>"
          fi

          echo "🧾 notarytool info stderr:"
          if [[ -s "$info_stderr_file" ]]; then
            cat "$info_stderr_file"
          else
            echo "<stderr vide>"
          fi

          if grep -Eiq "error|failed|invalid|unauthorized|forbidden|timeout|timed out|rate limit" "$info_stdout_file" "$info_stderr_file"; then
            echo "⚠️ Motif d'erreur détecté dans la sortie notarytool (tentative $attempt)."
          fi

          if [[ -s "$info_stdout_file" ]] && jq -e . "$info_stdout_file" >/dev/null 2>&1; then
            parsed_status=$(jq -r '.status // empty' "$info_stdout_file")
            if [[ -n "$parsed_status" ]]; then
              status="$parsed_status"
              json_error_streak=0
            else
              json_error_streak=$((json_error_streak+1))
              echo "⚠️ Champ status absent dans le JSON, conservation du statut précédent: ${status:-unknown}"
              echo "⚠️ Erreurs JSON consécutives: $json_error_streak/$json_error_limit"
            fi
          else
            json_error_streak=$((json_error_streak+1))
            echo "⚠️ JSON info invalide ou vide, conservation du statut précédent: ${status:-unknown}"
            echo "⚠️ Erreurs JSON consécutives: $json_error_streak/$json_error_limit"
          fi

          if [[ $json_error_streak -ge $json_error_limit ]]; then
            status="JsonErrorThreshold"
            echo "❌ Échec anticipé: $json_error_streak erreurs JSON consécutives détectées (seuil: $json_error_limit)."
            break
          fi

          echo "Statut actuel: ${status:-unknown}"
        done

        echo "${status:-Unknown}" > "$status_file"
        echo "notarization_status=${status:-Unknown}" >> $GITHUB_OUTPUT

        if [[ "$status" == "Accepted" ]]; then
          echo "✅ Notarisation réussie"
          exit 0
        elif [[ "$status" == "Invalid" ]]; then
          echo "❌ Notarisation rejetée (Invalid)"
          xcrun notarytool log "$submission_id" \
            --apple-id "${apple_id}" \
            --team-id "${team_id}" \
            --password "${password}" \
            --output-format json || true
          exit 1
        elif [[ "$status" == "JsonErrorThreshold" ]]; then
          echo "❌ Notarisation interrompue: trop d'erreurs JSON consécutives lors du polling notarytool info."
          echo "↳ Dernier stdout capturé: ${last_info_stdout_file:-n/a}"
          echo "↳ Dernier stderr capturé: ${last_info_stderr_file:-n/a}"
          exit 1
        else
          echo "❌ Notarisation non terminée ou statut inattendu: '${status:-Unknown}'"
          exit 1
        fi
      env:
        apple_id: ${{ inputs.apple_id }}
        team_id: ${{ inputs.team_id }}
        password: ${{ inputs.password }}
        dmg_path: ${{ steps.setup.outputs.dmg_path }}
