name: "build create makejson"
description: "if the file make.json doesn't exist then it is being created with the informations in inputs"
inputs:
  version:
    description: "Version of 4D"
    required: true
    # example: "20R7"

runs:
  using: "composite"
  steps:
    - name: git config
      run: |
        git config --local user.name "GitHub Action"
        git config --local user.email "action@github.com"
      shell: bash

    - name: extract major version
      id: extract_major_version
      shell: bash
      run: |
        if [[ "${{ inputs.version }}" =~ ^([0-9]+) ]]; then
          major_version="${BASH_REMATCH[1]}"
        else
          major_version="main"
        fi
        echo "major_version=${major_version}" >> $GITHUB_OUTPUT

    - name: Create make.json
      id: create_makejson
      shell: bash
      run: |
        set -e
        ls -la
        if [ ! -f make.json ]; then
          echo "Creating make.json for version: ${{ inputs.version }}"
          version="${{ steps.extract_major_version.outputs.major_version }}"
          echo "Version: $version"
          if [[ "$version" == "main" || "$version" -gt 20 ]]; then
            echo "{\"output\": \"build\",\"targets\": [{\"path\": \"./\"}],\"postBuild\": {\"remove\": [\"Data\",\"tools\", \"installer_script.iss\",\"package.json\",\"package-lock.json\",\"README.md\"]},\"dependencies\": [\"4D NetKit\",\"4D Progress\",\"4D SVG\",\"4D WritePro Interface\",\"4D ViewPro\",\"4D Widgets\",\"4D AIKit\"]}" > make.json
          else
            echo "{\"output\": \"build\",\"targets\": [{\"path\": \"./\"}],\"postBuild\": {\"remove\": [\"Data\",\"tools\", \"installer_script.iss\",\"package.json\",\"package-lock.json\",\"README.md\"]},\"dependencies\": [\"4D NetKit\",\"4D Progress\",\"4D SVG\",\"4D WritePro Interface\",\"4D ViewPro\",\"4D Widgets\",\"4D AIKit\"]}" > make.json
          fi
          echo "make.json created."
          git config --global commit.gpgsign false
          git add make.json
          git commit -m "Create make.json"

          MAX_RETRIES=3
          ATTEMPT=1
          while [ "$ATTEMPT" -le "$MAX_RETRIES" ]; do
            echo "Push attempt $ATTEMPT/$MAX_RETRIES"

            git fetch origin main

            if ! git rebase origin/main; then
              echo "Rebase failed on attempt $ATTEMPT"
              git rebase --abort || true
              if [ "$ATTEMPT" -eq "$MAX_RETRIES" ]; then
                echo "Unable to rebase after $MAX_RETRIES attempts."
                exit 1
              fi
              sleep $((2 ** ATTEMPT))
              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            if git push origin HEAD:main; then
              echo "Push succeeded."
              break
            fi

            if [ "$ATTEMPT" -eq "$MAX_RETRIES" ]; then
              echo "Unable to push after $MAX_RETRIES attempts."
              exit 1
            fi

            sleep $((2 ** ATTEMPT))
            ATTEMPT=$((ATTEMPT + 1))
          done
        else
          echo "make.json already exists."
        fi
        echo "make_json_exists=$(test -f make.json && echo true || echo false)" >> $GITHUB_OUTPUT
