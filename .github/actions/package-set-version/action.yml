name: Set Package Version
description: Safely bump version in package.json and create non-prefixed git tag

inputs:
  mode:
    required: true
    type: string

outputs:
  version:
    value: ${{ steps.bump.outputs.version }}
  tag:
    value: ${{ steps.bump.outputs.tag }}
  mode:
    value: ${{ inputs.mode }}

runs:
  using: "composite"
  steps:

    - name: Configure Git
      run: |
        git config --local user.name "GitHub Action"
        git config --local user.email "action@github.com"
      shell: bash

    - name: Pull latest changes
      run: git pull --rebase origin main
      shell: bash

    - name: Fetch remote tags
      run: git fetch --tags --force
      shell: bash

    - name: Handle version bump (safe, without v-prefix)
      id: bump
      run: |
        MODE="${{ inputs.mode }}"
        CURRENT_VERSION=$(jq -r .version package.json)

        echo "📦 Version actuelle : $CURRENT_VERSION"

        # Découper MAJOR.MINOR.PATCH
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

        # Incrément selon le mode
        if [ "$MODE" == "major" ]; then
          MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
        elif [ "$MODE" == "minor" ]; then
          MINOR=$((MINOR + 1)); PATCH=0
        elif [ "$MODE" == "patch" ]; then
          PATCH=$((PATCH + 1))
        else
          echo "❌ Mode inconnu: $MODE"
          exit 1
        fi

        NEXT_VERSION="$MAJOR.$MINOR.$PATCH"
        echo "🎯 Nouvelle version : $NEXT_VERSION"

        # Vérifier si le tag existe localement
        if git rev-parse "$NEXT_VERSION" >/dev/null 2>&1; then
          echo "⚠️ Tag local $NEXT_VERSION existe déjà, suppression"
          git tag -d "$NEXT_VERSION"
        fi

        # Vérifier si le tag existe à distance
        if git ls-remote --tags origin | grep -q "refs/tags/$NEXT_VERSION"; then
          echo "❌ Le tag $NEXT_VERSION existe déjà à distance. Annulation."
          exit 1
        fi

        # Mettre à jour package.json
        jq --arg v "$NEXT_VERSION" '.version=$v' package.json > tmp && mv tmp package.json
        git add package.json
        git commit -m "chore: bump version to $NEXT_VERSION"

        # Créer le tag non préfixé
        git tag "$NEXT_VERSION"
        echo "🏷️ Tag créé : $NEXT_VERSION"

        # Exposer version et tag comme outputs
        echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
        echo "tag=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Push commit + tag courant
      run: |
        # Retry logic pour gérer les erreurs transitoires serveur
        push_with_retry() {
          local branch_or_tag="$1"
          local max_attempts=3
          local attempt=1
          local delay=2

          while [ $attempt -le $max_attempts ]; do
            if git push origin "$branch_or_tag"; then
              echo "✅ Push de $branch_or_tag réussi"
              return 0
            fi
            
            if [ $attempt -lt $max_attempts ]; then
              echo "⚠️ Tentative $attempt échouée, attente ${delay}s avant retry..."
              sleep $delay
              delay=$((delay * 2))  # exponential backoff
              attempt=$((attempt + 1))
            else
              echo "❌ Push de $branch_or_tag échoué après $max_attempts tentatives"
              return 1
            fi
          done
        }

        push_with_retry main || exit 1
        push_with_retry ${{ steps.bump.outputs.tag }} || exit 1
        echo "🎉 Tous les pushes réussis"
      shell: bash